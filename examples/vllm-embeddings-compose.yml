version: "3"

services:
  vllm-embed:
    image: vllm/vllm-openai:v0.8.5
    container_name: vllm-embed
    ports:
      - "7870:8000"
    volumes:
      - /data/models/vllm/:/models
    restart: always
    tty: true
    environment:
      - HF_HOME=/models
    command: >
      --model BAAI/bge-small-en-v1.5
      --host 0.0.0.0
      --port 8000
      --gpu-memory-utilization 0.4
    shm_size: "8gb"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
