services:
  dev:
    build:
      context: ..
      dockerfile: docker/Dockerfile.dev
    image: tagmem-dev:latest
    working_dir: /workspace
    volumes:
      - ..:/workspace
      - ${TAGMEM_DATA_ROOT}/xdg/config:${TAGMEM_DATA_ROOT}/xdg/config
      - ${TAGMEM_DATA_ROOT}/xdg/data:${TAGMEM_DATA_ROOT}/xdg/data
      - ${TAGMEM_DATA_ROOT}/xdg/cache:${TAGMEM_DATA_ROOT}/xdg/cache
      - ${TAGMEM_DATA_ROOT}/bench-results:${TAGMEM_DATA_ROOT}/bench-results
      - ${TAGMEM_DATA_ROOT}/datasets:${TAGMEM_DATA_ROOT}/datasets
    environment:
      XDG_CONFIG_HOME: ${TAGMEM_DATA_ROOT}/xdg/config
      XDG_DATA_HOME: ${TAGMEM_DATA_ROOT}/xdg/data
      XDG_CACHE_HOME: ${TAGMEM_DATA_ROOT}/xdg/cache
      TAGMEM_BENCH_ROOT: ${TAGMEM_DATA_ROOT}/bench-results
      TAGMEM_DATASET_ROOT: ${TAGMEM_DATA_ROOT}/datasets
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
    runtime: nvidia
    stdin_open: true
    tty: true
